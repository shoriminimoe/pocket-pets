name: release-build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0 platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive versionCode from tag
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' and any pre-release suffix
          SEMVER="${TAG#v}"
          BASE="${SEMVER%%-*}"
          MAJOR="$(echo "$BASE" | cut -d. -f1)"
          MINOR="$(echo "$BASE" | cut -d. -f2)"
          PATCH="$(echo "$BASE" | cut -d. -f3)"
          # Monotonically-increasing integer: M*10000 + m*100 + p
          # Supports up to minor 99 / patch 99 per major
          CODE=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))
          # Reserve 1 as the dev default, so release codes start at >= 100
          if [ "$CODE" -lt 100 ]; then CODE=$((CODE + 100)); fi
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Derived versionCode=$CODE for $TAG"

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug -PreleaseVersionCode=${{ steps.ver.outputs.code }} --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             "release-artifacts/pocket-pets-${{ github.event.release.tag_name }}-debug.apk"

      - name: Attach APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release-artifacts/*.apk
          prerelease: true
          fail_on_unmatched_files: true
